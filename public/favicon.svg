<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0f172a"/>
  
  <!-- Clipboard body -->
  <rect x="20" y="25" width="60" height="60" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="3"/>
  
  <!-- Clipboard clip -->
  <rect x="35" y="15" width="30" height="15" rx="4" fill="#3b82f6"/>
  <rect x="42" y="18" width="16" height="4" rx="2" fill="#0f172a"/>
  
  <!-- Checklist items -->
  <!-- Check 1 -->
  <rect x="28" y="40" width="8" height="8" rx="2" fill="#10b981"/>
  <path d="M30 44 L32 46 L36 42" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="40" y="42" width="32" height="4" rx="2" fill="#334155"/>
  
  <!-- Check 2 -->
  <rect x="28" y="54" width="8" height="8" rx="2" fill="#10b981"/>
  <path d="M30 58 L32 60 L36 56" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="40" y="56" width="28" height="4" rx="2" fill="#334155"/>
  
  <!-- Check 3 -->
  <rect x="28" y="68" width="8" height="8" rx="2" fill="#10b981"/>
  <path d="M30 72 L32 74 L36 70" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="40" y="70" width="24" height="4" rx="2" fill="#334155"/>
</svg>
